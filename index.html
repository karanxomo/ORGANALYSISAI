        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

        setIsOpen(false);

                    key={item}
                    onClick={() => scrollToSection(item)}
                    className={`block w-full text-left py-2 transition-colors duration-200 ${item === 'Testimonial' ? 'text-yellow-600 font-semibold' : 'text-gray-700 hover:text-yellow-600'}`}
